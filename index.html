<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dancing Cats — a cute audio player with looping music." />
    <title>Dancing Cats 🐱</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg: #0d0d0f;
        --surface: #18181c;
        --border: rgba(255,255,255,0.07);
        --text: #e8e8ea;
        --text-muted: #6b6b72;
        --accent: #c084fc;
        --accent-glow: rgba(192, 132, 252, 0.25);
        --kofi: #FF5E5B;
        --kofi-glow: rgba(255, 94, 91, 0.3);
        --radius: 16px;
        --transition: 220ms cubic-bezier(0.16, 1, 0.3, 1);
      }

      [data-theme="light"] {
        --bg: #f5f4f0;
        --surface: #ffffff;
        --border: rgba(0,0,0,0.08);
        --text: #1a1a1e;
        --text-muted: #9090a0;
        --accent: #8b5cf6;
        --accent-glow: rgba(139, 92, 246, 0.18);
        --kofi-glow: rgba(255, 94, 91, 0.2);
      }

      html, body {
        height: 100%;
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        transition: background var(--transition), color var(--transition);
      }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        gap: 32px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: 860px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 15px;
        font-weight: 500;
        color: var(--text-muted);
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .logo svg { color: var(--accent); }

      .theme-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color var(--transition), border-color var(--transition), background var(--transition);
      }

      .theme-btn:hover { color: var(--accent); border-color: var(--accent); }

      .cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: clamp(6px, 2vw, 16px);
        width: 100%;
        max-width: 860px;
      }

      .card {
        position: relative;
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border);
        background: var(--surface);
        aspect-ratio: 1 / 1;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 0 1px var(--border);
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .card::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 50%);
        pointer-events: none;
      }

      .player {
        width: 100%;
        max-width: 860px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px 24px;
        display: flex;
        align-items: center;
        gap: 20px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      }

      .track-info { flex: 1; min-width: 0; }

      .track-name {
        font-size: 15px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .track-sub {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .progress-wrap {
        flex: 2;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .progress-bar {
        width: 100%;
        height: 4px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
        cursor: pointer;
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        background: var(--accent);
        border-radius: 99px;
        transition: width 0.5s linear;
        box-shadow: 0 0 8px var(--accent-glow);
      }

      .time-row {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--text-muted);
      }

      .play-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: none;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 4px 16px var(--accent-glow);
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .play-btn:hover { transform: scale(1.08); box-shadow: 0 6px 24px var(--accent-glow); }
      .play-btn:active { transform: scale(0.96); }

      /* Donate nudge */
      .nudge {
        width: 100%;
        max-width: 860px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      }

      .nudge-text {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .nudge-emoji {
        font-size: 28px;
        flex-shrink: 0;
        animation: wiggle 2.5s ease-in-out infinite;
      }

      @keyframes wiggle {
        0%, 100% { transform: rotate(0deg); }
        20% { transform: rotate(-12deg); }
        40% { transform: rotate(12deg); }
        60% { transform: rotate(-6deg); }
        80% { transform: rotate(6deg); }
      }

      .nudge-copy p:first-child {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
      }

      .nudge-copy p:last-child {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 2px;
      }

      .nudge-kofi {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 99px;
        border: none;
        background: var(--kofi);
        color: #fff;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        white-space: nowrap;
        flex-shrink: 0;
        box-shadow: 0 4px 16px var(--kofi-glow);
        transition: transform var(--transition), box-shadow var(--transition), filter var(--transition);
      }

      .nudge-kofi:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px var(--kofi-glow);
        filter: brightness(1.08);
      }

      .nudge-kofi:active { transform: scale(0.97); }

      @media (max-width: 560px) {
        .player { flex-wrap: wrap; }
        .progress-wrap { order: 3; flex: 0 0 100%; }
        .nudge { flex-direction: column; text-align: center; }
        .nudge-text { flex-direction: column; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
    </style>
  </head>

  <body>
    <audio id="audio" src="Ice Cream.wav" loop preload="metadata"></audio>

    <div class="page">

      <header class="header">
        <div class="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          Dancing Cats
        </div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" aria-label="Switch to light mode">
          <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </header>

      <main>
        <div class="cards">
          <div class="card">
            <img src="https://media1.tenor.com/m/0Q5IZ6e9pC8AAAAd/cat-cute-cat.gif" alt="A cute cat dancing" width="440" height="440" loading="lazy" />
          </div>
          <div class="card">
            <img src="https://i.pinimg.com/originals/23/51/bc/2351bc65b2b5d75cef146b7edddf805b.gif" alt="Another dancing cat" width="440" height="440" loading="lazy" />
          </div>
        </div>
      </main>

      <div class="player" role="region" aria-label="Music player">
        <button class="play-btn" id="playBtn" onclick="toggleMusic()" aria-label="Play">
          <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>
        <div class="track-info">
          <div class="track-name">Ice Cream.wav</div>
          <div class="track-sub">Looping · Local file</div>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar" role="progressbar" aria-label="Playback progress" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" onclick="seek(event)">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="time-row">
            <span id="currentTime">0:00</span>
            <span id="duration">—</span>
          </div>
        </div>
      </div>

      <div class="nudge" role="complementary" aria-label="Support the creator">
        <div class="nudge-text">
          <span class="nudge-emoji" aria-hidden="true">🐱</span>
          <div class="nudge-copy">
            <p>Enjoying the dancing cats?</p>
            <p>A small coffee keeps them dancing — no pressure at all! ☕</p>
          </div>
        </div>
        <a class="nudge-kofi" href="https://ko-fi.com/dancingcats" target="_blank" rel="noopener noreferrer" aria-label="Buy me a coffee on Ko-fi">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M23.881 8.948c-.773-4.085-4.859-4.593-4.859-4.593H.723c-.604 0-.679.798-.679.798s-.082 7.324-.022 11.822c.164 2.424 2.586 2.672 2.586 2.672s8.267-.023 11.966-.049c2.438-.426 2.683-2.566 2.658-3.734 4.352.24 7.422-2.831 6.649-6.916zm-11.062 3.511c-1.246 1.453-4.011 3.976-4.011 3.976s-.121.119-.31.023c-.076-.057-.108-.09-.108-.09-.443-.441-3.368-3.049-4.034-3.954-.709-.965-1.041-2.7-.091-3.71.951-1.01 3.005-1.086 4.363.407 0 0 1.565-1.782 3.468-.963 1.904.82 1.832 3.011.723 4.311zm6.173.478c-.928.116-1.682.028-1.682.028V7.284h1.77s1.971.551 1.971 2.638c0 1.913-.985 2.667-2.059 3.015z"/>
          </svg>
          Buy me a coffee ☕
        </a>
      </div>

    </div>

    <script>
      const audio = document.getElementById('audio');
      const playIcon = document.getElementById('play-icon');
      const progressFill = document.getElementById('progressFill');
      const progressBar = document.querySelector('.progress-bar');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl = document.getElementById('duration');
      const playBtn = document.getElementById('playBtn');

      function fmt(s) {
        if (!isFinite(s)) return '—';
        const m = Math.floor(s / 60), sec = Math.floor(s % 60);
        return m + ':' + String(sec).padStart(2, '0');
      }

      function toggleMusic() {
        if (audio.paused) {
          audio.play();
          playIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
          playBtn.setAttribute('aria-label', 'Pause');
        } else {
          audio.pause();
          playIcon.innerHTML = '<polygon points="5,3 19,12 5,21"/>';
          playBtn.setAttribute('aria-label', 'Play');
        }
      }

      audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
          const pct = (audio.currentTime / audio.duration * 100);
          progressFill.style.width = pct + '%';
          progressBar.setAttribute('aria-valuenow', Math.round(pct));
          currentTimeEl.textContent = fmt(audio.currentTime);
        }
      });

      audio.addEventListener('loadedmetadata', () => {
        durationEl.textContent = fmt(audio.duration);
      });

      function seek(e) {
        const bar = e.currentTarget;
        const ratio = e.offsetX / bar.offsetWidth;
        if (audio.duration) audio.currentTime = ratio * audio.duration;
      }

      let theme = 'dark';
      function toggleTheme() {
        theme = theme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        const btn = document.getElementById('themeBtn');
        const icon = document.getElementById('theme-icon');
        if (theme === 'light') {
          btn.setAttribute('aria-label', 'Switch to dark mode');
          icon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
        } else {
          btn.setAttribute('aria-label', 'Switch to light mode');
          icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        }
      }
    </script>
  </body>
</html>
